<!-- Main Login Content -->
<main class="flex-grow flex items-center justify-center pt-24 pb-12 px-4 relative overflow-hidden">
    <!-- Background element -->
    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[120%] h-[120%] bg-[radial-gradient(circle_at_center,rgba(247,230,204,0.4)_0%,transparent_60%)] pointer-events-none"></div>
    
    <div class="w-full max-w-md relative z-10 bg-white/50 backdrop-blur-xl border border-white/20 p-10 md:p-12 rounded-2xl shadow-[0_20px_40px_rgba(21,33,52,0.05)] text-center animate-fade-in opacity-0" style="animation-delay: 100ms;">
        <h1 class="text-4xl font-serif-refined text-primary mb-2">Welcome Back</h1>
        <p class="text-sm font-light text-primary/60 mb-10">Sign in to access your exclusive portfolio.</p>
        
        <form id="loginForm" onsubmit="handleLoginSubmit(event)" class="flex flex-col gap-6 text-left">
            <div class="flex flex-col gap-2">
                <label class="text-[10px] uppercase tracking-widest font-bold text-primary/70">Email Address</label>
                <input id="loginEmail" class="w-full bg-transparent border-b border-primary/20 py-3 focus:outline-none focus:border-primary transition-colors font-light tracking-wide placeholder:opacity-30 placeholder:text-primary" placeholder="name@example.com" type="email" required/>
            </div>
            
            <div class="flex flex-col gap-2">
                <label class="text-[10px] uppercase tracking-widest font-bold text-primary/70">Password</label>
                <input id="loginPassword" class="w-full bg-transparent border-b border-primary/20 py-3 focus:outline-none focus:border-primary transition-colors font-light tracking-wide placeholder:opacity-30 placeholder:text-primary" placeholder="••••••••" type="password" required/>
            </div>
            
            <div class="flex items-center justify-between mt-2">
                <label class="flex items-center gap-2 cursor-pointer group">
                    <input type="checkbox" class="w-4 h-4 rounded border-primary/30 text-primary focus:ring-primary/50 cursor-pointer"/>
                    <span class="text-xs font-light text-primary/70 group-hover:text-primary transition-colors">Remember me</span>
                </label>
                <a href="#" class="text-xs font-light text-primary/70 hover:text-primary underline transition-colors">Forgot password?</a>
            </div>
            
            <button id="loginBtn" class="mt-4 w-full bg-primary text-white py-4 rounded-lg font-hanken font-bold text-xs uppercase tracking-[0.2em] hover:shadow-xl hover:-translate-y-0.5 transition-all duration-300" type="submit">
                Sign In
            </button>
        </form>

        <div id="loginError" class="hidden mt-4 text-xs font-semibold text-rose-700 bg-rose-50 border border-rose-200 py-3 px-4 rounded-lg">
            ✕ Invalid email or password. Please try again.
        </div>

        <div id="loginSuccess" class="hidden mt-4 text-xs font-semibold text-emerald-700 bg-emerald-50 border border-emerald-200 py-3 px-4 rounded-lg">
            ✓ Login Successful! Welcome back. Redirecting...
        </div>
        
        <p class="mt-8 text-xs font-light text-primary/60">
            Not a member yet? <a href="signup.html" class="font-medium text-primary hover:underline">Request access</a>
        </p>
    </div>
</main>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyDYdTCripHL3z68_ok_3weUp34yvhD6zLk",
    authDomain: "real-estate-78412.firebaseapp.com",
    projectId: "real-estate-78412",
    storageBucket: "real-estate-78412.firebasestorage.app",
    messagingSenderId: "846988109657",
    appId: "1:846988109657:web:ebf3f52bc25153c306ce48"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.handleLoginSubmit = async function(event) {
    event.preventDefault();
    const loginBtn = document.getElementById('loginBtn');
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value.trim();
    const errorMsg = document.getElementById('loginError');
    const successMsg = document.getElementById('loginSuccess');

    errorMsg.classList.add('hidden');
    loginBtn.disabled = true;
    loginBtn.innerText = "Authenticating...";

    try {
        const q = query(collection(db, "users"), where("email", "==", email), where("password", "==", password));
        const querySnapshot = await getDocs(q);

        if (!querySnapshot.empty) {
            const userDoc = querySnapshot.docs[0];
            const userData = userDoc.data();
            
            localStorage.setItem('currentUser', JSON.stringify({
                id: userDoc.id,
                name: userData.name,
                email: userData.email,
                role: userData.role
            }));
            
            loginBtn.innerText = "Success!";
            loginBtn.classList.remove('bg-primary');
            loginBtn.classList.add('bg-emerald-600');
            successMsg.classList.remove('hidden');

            setTimeout(() => {
                window.location.href = 'user-dashboard.html';
            }, 1200);
        } else {
            errorMsg.innerText = `✕ Invalid email or password.`;
            errorMsg.classList.remove('hidden');
            loginBtn.disabled = false;
            loginBtn.innerText = "Sign In";
        }
    } catch (err) {
        console.error(err);
        errorMsg.innerText = '✕ Server connection error. Please try again.';
        errorMsg.classList.remove('hidden');
        loginBtn.disabled = false;
        loginBtn.innerText = "Sign In";
    }
}
</script>
