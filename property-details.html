<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Property Details - A. MANGUKIYA</title>
<link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700;900&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script>
tailwind.config = {
    theme: {
        extend: {
            colors: {
                "primary": "#152134",
                "sand": "#F7E6CC"
            },
            fontFamily: {
                "lato": ["Lato", "sans-serif"],
            }
        }
    }
}
</script>
<style>
    body {
        font-family: 'Lato', sans-serif;
        background-color: #fcfbf9;
        margin: 0;
        padding: 0;
    }
    
    .royal-font {
        font-family: 'Playfair Display', serif;
    }
</style>
</head>
<body class="text-gray-800 flex flex-col min-h-screen">
    <!-- Header -->
    <header class="bg-white px-8 py-3 flex items-center justify-between z-50 shadow-sm border-b border-gray-100 shrink-0 h-[65px]">
        <a href="user-dashboard.html" class="flex items-center gap-2 hover:opacity-80 transition-opacity">
            <svg class="w-5 h-5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
            <span class="font-bold text-gray-600 text-sm tracking-widest uppercase">Back</span>
        </a>
        <div class="font-black text-lg tracking-tight text-primary leading-none text-center">
            A. MANGUKIYA<br/>
            <span class="text-[10px] text-gray-500 tracking-widest font-normal uppercase">Real Estate</span>
        </div>
        <div class="w-16"></div> <!-- Spacer for center alignment -->
    </header>

    <div class="flex-1 w-full" id="detailsContainer">
        <!-- Content injected by JS -->
    </div>

<script>
    const DEFAULT_PROPERTIES = [];

    function getProperty() {
        const urlParams = new URLSearchParams(window.location.search);
        const id = parseInt(urlParams.get('id'));
        if(!id) return null;

        const customProps = JSON.parse(localStorage.getItem('customProperties') || '[]');
        const allProps = [...customProps, ...DEFAULT_PROPERTIES];
        
        return allProps.find(p => p.id === id);
    }

    function renderProperty() {
        const p = getProperty();
        const container = document.getElementById('detailsContainer');

        if (!p) {
            container.innerHTML = `<div class="text-center flex flex-col items-center justify-center h-full min-h-[600px]"><h2 class="text-2xl font-bold">Property Not Found</h2><a href="user-dashboard.html" class="text-blue-500 underline mt-4 inline-block">Return to Dashboard</a></div>`;
            return;
        }

        container.innerHTML = `
            <div class="flex flex-col lg:flex-row h-full min-h-[calc(100vh-65px)] max-w-[1500px] mx-auto">
                <!-- Left: Framed Image -->
                <div class="w-full lg:w-[45%] p-6 lg:p-10 flex items-center justify-center">
                    <div class="relative w-full aspect-[3/4] rounded-md overflow-hidden shadow-[0_10px_40px_rgba(0,0,0,0.08)] bg-gray-100 group">
                        <img src="${p.img}" alt="${p.name}" class="absolute inset-0 w-full h-full object-cover transition-transform duration-[4s] group-hover:scale-105">
                        <div class="absolute inset-0 bg-gradient-to-t from-[#152134]/80 via-transparent to-transparent"></div>
                        <div class="absolute bottom-8 left-8 right-8">
                            <span class="inline-block bg-white/95 text-[#152134] text-[10px] font-bold px-4 py-2 rounded-sm uppercase tracking-[0.2em] shadow-sm backdrop-blur-md mb-4">${p.tag || p.type}</span>
                            <div class="text-white font-bold tracking-widest text-sm uppercase opacity-80 border-l-2 border-[#b58b4c] pl-3">${p.country || 'India'}</div>
                        </div>
                    </div>
                </div>

                <!-- Right: Content -->
                <div class="w-full lg:w-[55%] flex flex-col p-8 lg:py-16 lg:pr-12 lg:pl-10 overflow-y-auto">
                    <div class="w-full flex flex-col h-full justify-center">
                        
                        <div class="mb-5 flex items-center gap-2 text-[11px] font-bold text-gray-400 uppercase tracking-[0.2em]">
                            <svg class="w-4 h-4 text-[#b58b4c]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/></svg>
                            ${p.location}
                        </div>
                        
                        <!-- Royal Font Title & Description -->
                        <h1 class="royal-font text-5xl lg:text-6xl font-bold mb-6 text-[#152134] leading-[1.1] tracking-tight">
                            ${p.name}
                        </h1>
                        
                        <div class="royal-font text-4xl font-black text-[#b58b4c] mb-10">
                            ${p.price}
                        </div>
                        
                        <div class="royal-font text-gray-500 text-xl lg:text-[22px] leading-relaxed italic mb-12 border-l border-[#b58b4c] pl-8 py-1">
                            "Experience luxury living in this exquisite ${p.type.toLowerCase()}, offering ${p.beds || 'N/A'} bedrooms, ${p.baths || 'N/A'} bathrooms, and ${p.sqft || 'N/A'} sqft of unparalleled elegance. Perfectly situated to blend tranquility with modern convenience."
                        </div>

                        <!-- Key Stats grid -->
                        <div class="grid grid-cols-2 gap-x-12 gap-y-8 mb-16 pt-8 border-t border-gray-200">
                            <div class="border-b border-gray-100 pb-4">
                                <div class="text-[10px] font-bold text-gray-400 uppercase tracking-[0.2em] mb-2">Property Type</div>
                                <div class="royal-font text-xl text-[#152134]">${p.type}</div>
                            </div>
                            <div class="border-b border-gray-100 pb-4">
                                <div class="text-[10px] font-bold text-gray-400 uppercase tracking-[0.2em] mb-2">Total Area</div>
                                <div class="royal-font text-xl text-[#152134]">${p.sqft || 'N/A'} sqft</div>
                            </div>
                            <div class="border-b border-gray-100 pb-4">
                                <div class="text-[10px] font-bold text-gray-400 uppercase tracking-[0.2em] mb-2">Bedrooms</div>
                                <div class="royal-font text-xl text-[#152134]">${p.beds || 'N/A'} Rooms</div>
                            </div>
                            <div class="border-b border-gray-100 pb-4">
                                <div class="text-[10px] font-bold text-gray-400 uppercase tracking-[0.2em] mb-2">Bathrooms</div>
                                <div class="royal-font text-xl text-[#152134]">${p.baths || 'N/A'} Baths</div>
                            </div>
                        </div>

                        <!-- Contact Section -->
                        <div class="mt-auto bg-[#152134] p-8 rounded-md shadow-lg border border-[#152134]">
                            <h4 class="font-bold text-white mb-2 uppercase tracking-[0.15em] text-sm">Schedule a Private Viewing</h4>
                            <p class="text-sm text-gray-400 mb-8">Contact our dedicated agents to arrange an exclusive tour or request a detailed brochure.</p>
                            
                            <div class="flex flex-col sm:flex-row gap-4">
                                <button onclick="alert('Our premium agent will contact you shortly!')" class="flex-1 bg-[#b58b4c] hover:bg-[#a07a40] text-white font-bold py-3.5 px-6 rounded transition-colors flex items-center justify-center gap-3 text-xs tracking-[0.1em] uppercase shadow-sm">
                                    Enquire Now
                                </button>
                                <a href="tel:+919876543210" class="flex-1 bg-transparent border border-gray-500 hover:border-white text-white font-bold py-3.5 px-6 rounded transition-colors flex items-center justify-center gap-3 text-xs tracking-[0.1em] uppercase">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"></path></svg>
                                    +91 98765 43210
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        `;
    }

    renderProperty();
</script>
</body>
</html>
