<!-- Main Signup Content -->
<main class="flex-grow flex items-center justify-center pt-24 pb-12 px-4 relative overflow-hidden">
    <!-- Background element -->
    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[120%] h-[120%] bg-[radial-gradient(circle_at_center,rgba(247,230,204,0.4)_0%,transparent_60%)] pointer-events-none"></div>
    
    <div class="w-full max-w-lg relative z-10 bg-white/50 backdrop-blur-xl border border-white/20 p-10 md:p-12 rounded-2xl shadow-[0_20px_40px_rgba(21,33,52,0.05)] text-center animate-fade-in opacity-0" style="animation-delay: 100ms;">
        <h1 class="text-4xl font-serif-refined text-primary mb-2">Request Access</h1>
        <p class="text-sm font-light text-primary/60 mb-8">Join our exclusive network for curated luxury real estate opportunities.</p>
        
        <form id="signupForm" onsubmit="handleSignupSubmit(event)" class="flex flex-col gap-6 text-left">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="flex flex-col gap-2">
                    <label class="text-[10px] uppercase tracking-widest font-bold text-primary/70">First Name</label>
                    <input id="firstName" class="w-full bg-transparent border-b border-primary/20 py-2 focus:outline-none focus:border-primary transition-colors font-light tracking-wide placeholder:opacity-30 placeholder:text-primary" placeholder="Jane" type="text" required/>
                </div>
                <div class="flex flex-col gap-2">
                    <label class="text-[10px] uppercase tracking-widest font-bold text-primary/70">Last Name</label>
                    <input id="lastName" class="w-full bg-transparent border-b border-primary/20 py-2 focus:outline-none focus:border-primary transition-colors font-light tracking-wide placeholder:opacity-30 placeholder:text-primary" placeholder="Doe" type="text" required/>
                </div>
            </div>
            
            <div class="flex flex-col gap-2">
                <label class="text-[10px] uppercase tracking-widest font-bold text-primary/70">Email Address</label>
                <input id="signupEmail" class="w-full bg-transparent border-b border-primary/20 py-2 focus:outline-none focus:border-primary transition-colors font-light tracking-wide placeholder:opacity-30 placeholder:text-primary" placeholder="name@example.com" type="email" required/>
            </div>

            <div class="flex flex-col gap-2">
                <label class="text-[10px] uppercase tracking-widest font-bold text-primary/70">Phone Number</label>
                <input id="signupMobile" class="w-full bg-transparent border-b border-primary/20 py-2 focus:outline-none focus:border-primary transition-colors font-light tracking-wide placeholder:opacity-30 placeholder:text-primary" placeholder="+1 (555) 000-0000" type="tel" required/>
            </div>
            
            <div class="flex flex-col gap-2">
                <label class="text-[10px] uppercase tracking-widest font-bold text-primary/70">Create Password</label>
                <input id="signupPassword" class="w-full bg-transparent border-b border-primary/20 py-2 focus:outline-none focus:border-primary transition-colors font-light tracking-wide placeholder:opacity-30 placeholder:text-primary" placeholder="••••••••" type="password" required/>
            </div>
            
            <button id="submitBtn" class="mt-4 w-full bg-primary text-white py-4 rounded-lg font-hanken font-bold text-xs uppercase tracking-[0.2em] hover:shadow-xl hover:-translate-y-0.5 transition-all duration-300" type="submit">
                Submit Request
            </button>
        </form>

        <div id="signupSuccess" class="hidden mt-4 text-xs font-semibold text-emerald-700 bg-emerald-50 border border-emerald-200 py-3 px-4 rounded-lg">
            ✓ Registration submitted! Account created. Redirecting to login...
        </div>

<script>
async function handleSignupSubmit(e) {
    if (e) e.preventDefault();
    const submitBtn = document.getElementById('submitBtn');
    const fname = document.getElementById('firstName').value.trim();
    const lname = document.getElementById('lastName').value.trim();
    const email = document.getElementById('signupEmail').value.trim();
    const mobile = document.getElementById('signupMobile').value.trim();
    const password = document.getElementById('signupPassword').value.trim();
    const successMsg = document.getElementById('signupSuccess');

    const fullName = `${fname} ${lname}`.trim() || email;

    submitBtn.disabled = true;
    submitBtn.innerText = "Creating Account...";

    try {
        const res = await fetch('/api/signup', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name: fullName, email, mobile: mobile || email, password })
        });

        if (res.ok) {
            submitBtn.innerText = "Account Created!";
            submitBtn.classList.remove('bg-primary');
            submitBtn.classList.add('bg-emerald-600');
            successMsg.classList.remove('hidden');
            
            setTimeout(() => {
                window.location.href = 'login.html';
            }, 1500);
        } else {
            const data = await res.json();
            alert(data.message || 'Failed to register. Please check details.');
            submitBtn.disabled = false;
            submitBtn.innerText = "Submit Request";
        }
    } catch (err) {
        console.error(err);
        alert('Error connecting to server. Please try again.');
        submitBtn.disabled = false;
        submitBtn.innerText = "Submit Request";
    }
}
</script>
        
        <p class="mt-8 text-xs font-light text-primary/60">
            Already a member? <a href="login.html" class="font-medium text-primary hover:underline">Sign in</a>
        </p>
    </div>
</main>
